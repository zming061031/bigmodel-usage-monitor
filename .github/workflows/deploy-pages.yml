name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: "manual"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      HAS_BIGMODEL_STORAGE: ${{ secrets.BIGMODEL_STORAGE_STATE_GZ_B64 != '' || secrets.BIGMODEL_STORAGE_STATE_B64 != '' }}
      HAS_CLOUDFLARE_STORAGE_TOKEN: ${{ secrets.CLOUDFLARE_REFRESH_TOKEN != '' }}
      BIGMODEL_STORAGE_STATE_GZ_B64: ${{ secrets.BIGMODEL_STORAGE_STATE_GZ_B64 }}
      BIGMODEL_STORAGE_STATE_B64: ${{ secrets.BIGMODEL_STORAGE_STATE_B64 }}
    steps:
      - name: Trigger info
        run: echo "trigger=${{ github.event_name }} source=${{ inputs.source || 'none' }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download latest BigModel login state
        if: ${{ env.HAS_CLOUDFLARE_STORAGE_TOKEN == 'true' }}
        env:
          CLOUDFLARE_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}
          STORAGE_STATE_URL: https://bigmodel-usage-refresh.zming061031.workers.dev/storage-state
          STORAGE_STATE_FILE: ${{ runner.temp }}/bigmodel-storage-state.input.gz.b64
        run: |
          if curl -fsS \
            -H "x-refresh-token: $CLOUDFLARE_REFRESH_TOKEN" \
            "$STORAGE_STATE_URL" \
            -o "$STORAGE_STATE_FILE"; then
            echo "BIGMODEL_STORAGE_STATE_GZ_B64_FILE=$STORAGE_STATE_FILE" >> "$GITHUB_ENV"
            echo "HAS_BIGMODEL_STORAGE=true" >> "$GITHUB_ENV"
            echo "Downloaded latest BigModel login state from Cloudflare KV."
          else
            rm -f "$STORAGE_STATE_FILE"
            echo "Cloudflare KV login state is unavailable; falling back to GitHub secret."
          fi

      - name: Install browser
        if: ${{ env.HAS_BIGMODEL_STORAGE == 'true' || env.HAS_CLOUDFLARE_STORAGE_TOKEN == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Capture BigModel usage
        if: ${{ env.HAS_BIGMODEL_STORAGE == 'true' || env.HAS_CLOUDFLARE_STORAGE_TOKEN == 'true' }}
        run: npm run capture:pages
        env:
          PAGES_REFRESHED_STORAGE_STATE_GZ_B64_PATH: ${{ runner.temp }}/bigmodel-storage-state.gz.b64

      - name: Upload refreshed BigModel login state
        if: ${{ env.HAS_CLOUDFLARE_STORAGE_TOKEN == 'true' }}
        env:
          CLOUDFLARE_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}
          STORAGE_STATE_URL: https://bigmodel-usage-refresh.zming061031.workers.dev/storage-state
          REFRESHED_STORAGE_STATE: ${{ runner.temp }}/bigmodel-storage-state.gz.b64
        run: |
          if [ ! -s "$REFRESHED_STORAGE_STATE" ]; then
            echo "No refreshed storage state was produced."
            exit 0
          fi

          curl -fsS \
            -X PUT \
            -H "x-refresh-token: $CLOUDFLARE_REFRESH_TOKEN" \
            --data-binary "@$REFRESHED_STORAGE_STATE" \
            "$STORAGE_STATE_URL" \
            > /dev/null

          rm -f "$REFRESHED_STORAGE_STATE"
          echo "Uploaded refreshed BigModel login state to Cloudflare KV."

      - name: Remove refreshed login state temp file
        if: ${{ always() }}
        run: |
          rm -f "${{ runner.temp }}/bigmodel-storage-state.gz.b64"
          rm -f "${{ runner.temp }}/bigmodel-storage-state.input.gz.b64"

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
