name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: "manual"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      HAS_BIGMODEL_STORAGE: ${{ secrets.BIGMODEL_STORAGE_STATE_GZ_B64 != '' || secrets.BIGMODEL_STORAGE_STATE_B64 != '' }}
      HAS_SESSION_ROTATION_TOKEN: ${{ secrets.SESSION_ROTATION_TOKEN != '' }}
      BIGMODEL_STORAGE_STATE_GZ_B64: ${{ secrets.BIGMODEL_STORAGE_STATE_GZ_B64 }}
      BIGMODEL_STORAGE_STATE_B64: ${{ secrets.BIGMODEL_STORAGE_STATE_B64 }}
    steps:
      - name: Trigger info
        run: echo "trigger=${{ github.event_name }} source=${{ inputs.source || 'none' }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        if: ${{ env.HAS_BIGMODEL_STORAGE == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Capture BigModel usage
        if: ${{ env.HAS_BIGMODEL_STORAGE == 'true' }}
        run: npm run capture:pages
        env:
          PAGES_REFRESHED_STORAGE_STATE_GZ_B64_PATH: ${{ runner.temp }}/bigmodel-storage-state.gz.b64

      - name: Rotate BigModel login state
        if: ${{ env.HAS_BIGMODEL_STORAGE == 'true' && env.HAS_SESSION_ROTATION_TOKEN == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.SESSION_ROTATION_TOKEN }}
          REFRESHED_STORAGE_STATE: ${{ runner.temp }}/bigmodel-storage-state.gz.b64
        run: |
          if [ ! -s "$REFRESHED_STORAGE_STATE" ]; then
            echo "No refreshed storage state was produced."
            exit 0
          fi

          gh secret set BIGMODEL_STORAGE_STATE_GZ_B64 \
            --repo "$GITHUB_REPOSITORY" \
            < "$REFRESHED_STORAGE_STATE"

          rm -f "$REFRESHED_STORAGE_STATE"
          echo "Rotated BigModel login state secret."

      - name: Remove refreshed login state temp file
        if: ${{ always() }}
        run: rm -f "${{ runner.temp }}/bigmodel-storage-state.gz.b64"

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
